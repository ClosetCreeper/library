<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1916;
    --border: #2e2c28;
    --text: #f0ece0;
    --muted: #8a8578;
    --accent: #c8a96e;
    --accent-dim: rgba(200,169,110,0.12);
    --red: #e05252;
    --orange: #e07a2f;
    --yellow: #d4b84a;
    --green: #5aab6e;
    --blue: #4a7fc1;
    --purple: #8b5cf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: 0.4;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .scanner-ring {
    width: 100%;
    max-width: 540px;
  }

  /* Barcode input zone */
  .scan-zone {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    position: relative;
    margin-bottom: 24px;
  }

  .scan-zone.active {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), 0 0 24px rgba(200,169,110,0.08);
  }

  .scan-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .scan-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .pulse-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.7); }
  }

  #barcode-input {
    position: absolute;
    opacity: 0;
    pointer-events: none;
    width: 1px;
    height: 1px;
  }

  .barcode-display {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1.6rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    min-height: 2.2rem;
    display: flex;
    align-items: center;
    gap: 2px;
  }

  .barcode-display span {
    opacity: 0;
    animation: fadeIn 0.1s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  .waiting-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    animation: blink 1.2s step-end infinite;
  }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

  /* Book card */
  .book-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 28px 32px;
    margin-bottom: 24px;
    display: none;
    animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .book-card.visible { display: block; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .book-isbn {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .book-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    line-height: 1.3;
    margin-bottom: 6px;
  }

  .book-author {
    font-size: 0.9rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 24px;
  }

  .loading-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 24px;
  }

  .loading-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.1s linear;
    border-radius: 2px;
  }

  /* Color picker */
  .color-section {
    display: none;
  }

  .color-section.visible { display: block; }

  .color-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .color-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .color-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 16px;
  }

  .color-chip {
    border: none;
    border-radius: 3px;
    padding: 8px 18px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    color: #fff;
    font-weight: 500;
    transition: transform 0.1s, opacity 0.1s, box-shadow 0.15s;
    opacity: 0.75;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }

  .color-chip:hover {
    opacity: 1;
    transform: translateY(-1px);
  }

  .color-chip.selected {
    opacity: 1;
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    outline: 2px solid white;
    outline-offset: 2px;
  }

  /* Add color */
  .add-color-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }

  .add-color-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .add-color-input::placeholder { color: var(--muted); }
  .add-color-input:focus { border-color: var(--accent); }

  .color-preview-swatch {
    width: 38px;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    background: #888;
  }

  .btn-add-color {
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    color: var(--accent);
    border-radius: 3px;
    padding: 8px 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .btn-add-color:hover { background: rgba(200,169,110,0.2); }

  /* Actions */
  .actions {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn-save {
    flex: 1;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 3px;
    padding: 14px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    font-weight: 500;
    transition: opacity 0.15s, transform 0.1s;
  }

  .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-save:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 3px;
    padding: 14px 20px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }

  .btn-reset:hover { border-color: var(--muted); color: var(--text); }

  /* Status toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 24px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 100;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--red); color: var(--red); }

  /* Config panel */
  .config-toggle {
    text-align: center;
    margin-top: 32px;
  }

  .btn-config {
    background: none;
    border: none;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 4px 8px;
    transition: color 0.15s;
  }

  .btn-config:hover { color: var(--text); }

  .config-panel {
    display: none;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px 32px;
    margin-top: 16px;
    max-width: 540px;
    width: 100%;
    animation: slideUp 0.2s ease;
  }

  .config-panel.open { display: block; }

  .config-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .config-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    outline: none;
    transition: border-color 0.15s;
  }

  .config-input:focus { border-color: var(--accent); }
  .config-input::placeholder { color: var(--muted); }

  .config-hint {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.5;
  }

  .error-note {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--red);
    margin-top: 8px;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Book Scanner</h1>
  <p>Scan · Identify · Catalog</p>
</header>

<div class="scanner-ring">

  <!-- Scan zone -->
  <div class="scan-zone" id="scan-zone">
    <div class="scan-label">
      <span class="pulse-dot"></span>
      Listening for barcode
    </div>
    <div class="barcode-display" id="barcode-display">
      <span class="waiting-text">scan now_</span>
    </div>
    <input type="text" id="barcode-input" autocomplete="off" />
  </div>

  <!-- Book card -->
  <div class="book-card" id="book-card">
    <div class="book-isbn" id="book-isbn"></div>
    <div class="loading-bar" id="loading-bar" style="display:none">
      <div class="loading-fill" id="loading-fill"></div>
    </div>
    <div class="book-title" id="book-title"></div>
    <div class="book-author" id="book-author"></div>
    <div class="error-note" id="error-note">Could not find book info. Check the ISBN and try again.</div>

    <!-- Color picker -->
    <div class="color-section" id="color-section">
      <div class="color-label">Color</div>
      <div class="color-grid" id="color-grid"></div>

      <!-- Add custom color -->
      <div class="add-color-row">
        <input type="text" class="add-color-input" id="new-color-name" placeholder="New color name…" />
        <input type="color" class="color-preview-swatch" id="new-color-hex" value="#a855f7" title="Pick color" />
        <button class="btn-add-color" onclick="addColor()">+ Add</button>
      </div>
    </div>

    <div class="actions" id="actions" style="display:none">
      <button class="btn-reset" onclick="resetScanner()">Clear</button>
    </div>
  </div>

</div>



<div class="toast" id="toast"></div>

<script>
  // ── State ────────────────────────────────────────────────────
  let currentBook = null;
  let selectedColor = null;
  let barcodeBuffer = '';
  let barcodeTimer = null;

  const COLORS = JSON.parse(localStorage.getItem('bookscanner_colors') || 'null') || [
    { name: 'Red',    hex: '#e05252' },
    { name: 'Orange', hex: '#e07a2f' },
    { name: 'Yellow', hex: '#d4b84a' },
    { name: 'Green',  hex: '#5aab6e' },
    { name: 'Blue',   hex: '#4a7fc1' },
    { name: 'Purple', hex: '#8b5cf6' },
  ];

  function saveColors() {
    localStorage.setItem('bookscanner_colors', JSON.stringify(COLORS));
  }

  // ── Barcode capture ──────────────────────────────────────────
  // Always focused invisible input catches scanner keypresses
  const barcodeInput = document.getElementById('barcode-input');

  function focusScanner() {
    barcodeInput.focus();
  }

  document.addEventListener('click', focusScanner);
  document.addEventListener('keydown', (e) => {
    // If user types in our own inputs, don't steal focus
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' && document.activeElement !== barcodeInput) return;
    if (tag === 'BUTTON') return;
    barcodeInput.focus();
  });

  barcodeInput.addEventListener('input', (e) => {
    barcodeBuffer += barcodeInput.value;
    barcodeInput.value = '';
    renderBarcodeDisplay(barcodeBuffer);

    clearTimeout(barcodeTimer);
    barcodeTimer = setTimeout(() => {
      if (barcodeBuffer.trim().length > 5) {
        handleBarcode(barcodeBuffer.trim());
      }
      barcodeBuffer = '';
    }, 100); // USB scanners send Enter; handle after brief pause
  });

  barcodeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      clearTimeout(barcodeTimer);
      const code = barcodeBuffer.trim();
      barcodeBuffer = '';
      barcodeInput.value = '';
      if (code.length > 5) handleBarcode(code);
    }
  });

  // Also catch keyboard globally for scanners that don't focus the input
  document.addEventListener('keypress', (e) => {
    const tag = document.activeElement.tagName;
    if (tag === 'INPUT' && document.activeElement !== barcodeInput) return;
  });

  function renderBarcodeDisplay(text) {
    const el = document.getElementById('barcode-display');
    el.innerHTML = text.split('').map((c, i) =>
      `<span style="animation-delay:${i * 0.02}s">${c}</span>`
    ).join('');
  }

  // ── Book lookup ──────────────────────────────────────────────
  async function handleBarcode(isbn) {
    // Sanitize: only digits
    isbn = isbn.replace(/\D/g, '');
    if (!isbn) return;

    resetScanner(false);
    document.getElementById('scan-zone').classList.add('active');
    renderBarcodeDisplay(isbn);

    const card = document.getElementById('book-card');
    card.classList.add('visible');
    document.getElementById('book-isbn').textContent = 'ISBN ' + isbn;
    document.getElementById('book-title').textContent = '';
    document.getElementById('book-author').textContent = 'Looking up…';
    document.getElementById('loading-bar').style.display = 'block';
    document.getElementById('error-note').style.display = 'none';

    // Animate loading bar
    let pct = 0;
    const fill = document.getElementById('loading-fill');
    const loadInt = setInterval(() => {
      pct = Math.min(pct + Math.random() * 15, 85);
      fill.style.width = pct + '%';
    }, 200);

    try {
      const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
      const data = await res.json();
      const key = `ISBN:${isbn}`;

      clearInterval(loadInt);
      fill.style.width = '100%';
      setTimeout(() => { document.getElementById('loading-bar').style.display = 'none'; }, 400);

      if (data[key]) {
        const book = data[key];
        const title = book.title || 'Unknown Title';

        // by_statement is the cleanest source ("Amy Tan") — fall back to first author only
        let author = 'Unknown Author';
        if (book.by_statement) {
          author = book.by_statement.replace(/^by\s+/i, '').replace(/\.$/, '').trim();
        } else if (book.authors && book.authors.length > 0) {
          author = book.authors[0].name;
        }

        currentBook = { isbn, title, author };
        document.getElementById('book-title').textContent = title;
        document.getElementById('book-author').textContent = author;
        document.getElementById('color-section').classList.add('visible');
        document.getElementById('actions').style.display = 'flex';
        renderColors();
      } else {
        document.getElementById('book-author').textContent = '';
        document.getElementById('error-note').style.display = 'block';
      }
    } catch (err) {
      clearInterval(loadInt);
      document.getElementById('loading-bar').style.display = 'none';
      document.getElementById('book-author').textContent = '';
      document.getElementById('error-note').style.display = 'block';
      document.getElementById('error-note').textContent = 'Network error. Check connection.';
    }
  }

  // ── Colors ───────────────────────────────────────────────────
  function renderColors() {
    const grid = document.getElementById('color-grid');
    grid.innerHTML = '';
    COLORS.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'color-chip' + (selectedColor === c.name ? ' selected' : '');
      btn.style.background = c.hex;
      btn.textContent = c.name;
      btn.onclick = () => selectColor(c.name);
      grid.appendChild(btn);
    });
  }

  function selectColor(name) {
    selectedColor = name;
    renderColors();
    saveEntry();
  }

  function addColor() {
    const nameEl = document.getElementById('new-color-name');
    const hexEl = document.getElementById('new-color-hex');
    const name = nameEl.value.trim();
    const hex = hexEl.value;
    if (!name) { showToast('Enter a color name', 'error'); return; }
    if (COLORS.find(c => c.name.toLowerCase() === name.toLowerCase())) {
      showToast('Color already exists', 'error'); return;
    }
    COLORS.push({ name, hex });
    saveColors();
    nameEl.value = '';
    renderColors();
    showToast(`"${name}" added`, 'success');
  }

  // ── Save ─────────────────────────────────────────────────────
  function saveEntry() {
    if (!currentBook || !selectedColor) return;
    const url = 'https://script.google.com/macros/s/AKfycbwk1SV2wLEOOx_IY2uAF2PQHgSu6Dq1V8kPFn54XlpmQBd8dJrVs1zRryrstePKaWh3WA/exec';

    const params = new URLSearchParams({
      isbn:   currentBook.isbn,
      title:  currentBook.title,
      author: currentBook.author,
      color:  selectedColor,
    });

    // Image ping bypasses CORS entirely — Apps Script receives the GET no matter what
    const img = new Image();
    img.src = url + '?' + params.toString();
    img.onload = img.onerror = () => {}; // silence errors; request still fires

    showToast('Saved to sheet ✓', 'success');
    setTimeout(() => {
      document.getElementById('toast').className = 'toast';
      resetScanner();
    }, 1200);
  }

  // ── Reset ────────────────────────────────────────────────────
  function resetScanner(focusInput = true) {
    currentBook = null;
    selectedColor = null;
    barcodeBuffer = '';
    barcodeInput.value = '';

    document.getElementById('scan-zone').classList.remove('active');
    document.getElementById('barcode-display').innerHTML = '<span class="waiting-text">scan now_</span>';
    document.getElementById('book-card').classList.remove('visible');
    document.getElementById('color-section').classList.remove('visible');
    document.getElementById('actions').style.display = 'none';
    document.getElementById('error-note').style.display = 'none';
    document.getElementById('loading-bar').style.display = 'none';

    if (focusInput) focusScanner();
  }

  // ── Toast ────────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast show ' + type;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 3000);
  }

  // ── Init ─────────────────────────────────────────────────────
  renderColors();
  focusScanner();
</script>
</body>
</html>
